{
  "schema_version": "1.0.0",
  "chunk_duration_ms": 3000,
  "chunk_overlap_ms": 250,
  "sample_interval_ms": 1000,
  "adapters": ["subtitle", "shot"],
  "subtitle": {"mode": "all", "tracks": []},
  "shot": {
    "enabled": true,
    "sample_fps": 10,
    "hard_threshold": 0.15,
    "gradual_threshold": 0.02,
    "min_duration_ms": 500,
    "max_duration_ms": 5000,
    "flash_suppression_ms": 250
  },
  "resources": {
    "subprocess_timeout_seconds": 30,
    "max_duration_ms": 600000,
    "max_video_width": 4096,
    "max_video_height": 4096,
    "max_keyframes": 1000
  }
}
